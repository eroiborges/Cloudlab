# Deployment do Frontend React
apiVersion: apps/v1
kind: Deployment
metadata:
  name: northwind-frontend
  namespace: northwind-demo
  labels:
    app: northwind-frontend
    component: web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: northwind-frontend
  template:
    metadata:
      labels:
        app: northwind-frontend
        component: web
        tier: frontend
    spec:
      containers:
      - name: web
        image: ayxwnzmecwt63a.azurecr.io/northwind-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: northwind-config
        - secretRef:
            name: northwind-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        # securityContext removido para ambiente de demonstração
        # Para produção, configure adequadamente as permissões

