# ConfigMap com configurações da aplicação
apiVersion: v1
kind: ConfigMap
metadata:
  name: northwind-config
  namespace: northwind-demo
  labels:
    app: northwind-ecommerce
data:
  # Configurações do Backend
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DEBUG: "false"
  USE_MANAGED_IDENTITY: "false"  # Default para usar Managed Identity
  ERROR_PAYMENT_RATE: "15"
  ERROR_STOCK_RATE: "15"
  SUCCESS_RATE: "70"
  
  # Configurações do Frontend - Runtime injection
  API_BASE_URL: "http://20.112.227.80:8000"
  APPINSIGHTS_CONNECTION_STRING: "InstrumentationKey=88bd8c92-2aba-442a-86e3-f98966a7393a;IngestionEndpoint=https://eastus2-3.in.applicationinsights.azure.com/;LiveEndpoint=https://eastus2.livediagnostics.monitor.azure.com/;ApplicationId=969400a5-e5c6-4e40-bffa-be8fc2b1c89d"
  
  # Configurações do Load Generator
  LOAD_USERS: "10"
  LOAD_SPAWN_RATE: "2"
  LOAD_DURATION: "300"

---
